# Production config — values injected by Railway environment variables
server.port=${PORT:8080}

# Railway MySQL plugin sets MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Set JWT_SECRET and GEMINI_API_KEY in Railway environment variables
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
gemini.api.key=${GEMINI_API_KEY}
