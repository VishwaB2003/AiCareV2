# AWS Production config — set these in Elastic Beanstalk Environment Properties
server.port=5000

# RDS MySQL — EB sets RDS_* variables automatically when you attach an RDS instance
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Set JWT_SECRET and GEMINI_API_KEY in EB Environment Properties
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
gemini.api.key=${GEMINI_API_KEY}
